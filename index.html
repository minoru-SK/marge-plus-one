<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Merge+1 4x4</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background: #faf8ef;
        text-align: center;
        margin: 0;
        padding: 0;
    }
    h1 {
        margin-top: 20px;
        color: #776e65;
    }
    #game {
        width: 320px;
        height: 320px;
        background: #bbada0;
        margin: 20px auto;
        padding: 10px;
        border-radius: 6px;
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        grid-gap: 10px;
    }
    .cell {
        width: 70px;
        height: 70px;
        background: #cdc1b4;
        border-radius: 4px;
    }
    .tile {
    position: absolute;
    width: 70px;
    height: 70px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
    font-weight: bold;
    color: #fff;
    transition: top 0.15s ease, left 0.15s ease;
}

.tile-1 { background: #eee4da; color: #776e65; }
.tile-2 { background: #ede0c8; color: #776e65; }
.tile-3 { background: #f2b179; }
.tile-4 { background: #f59563; }
.tile-5 { background: #f67c5f; }
.tile-6 { background: #f65e3b; }
.tile-7 { background: #edcf72; }
.tile-8 { background: #edcc61; }
.tile-9 { background: #edc850; }
.tile-10 { background: #edc53f; }
.tile-11 { background: #edc22e; }

.tile-merge {
    animation: mergePop 0.2s ease;
}

@keyframes mergePop {
    0% { transform: scale(1); }
    50% { transform: scale(1.25); }
    100% { transform: scale(1); }
}

.tile-new {
    animation: popIn 0.2s ease;
}

@keyframes popIn {
    0% { transform: scale(0); }
    100% { transform: scale(1); }
}

    #settings {
        width: 90%;
        margin: 20px auto;
        background: #eee;
        padding: 10px;
        border-radius: 6px;
        text-align: left;
    }
    .row {
        display: flex;
        align-items: center;
        margin: 5px 0;
    }
    .row label {
        width: 30px;
    }
    .row input[type="range"] {
        flex: 1;
        margin: 0 10px;
    }
</style>
</head>
<body>

<h1>Merge+1 4×4</h1>

<div id="game"></div>

<button onclick="resetGame()">リセット</button>

<h2>出現確率設定</h2>
<div id="settings">
    <div class="row">
        <label>1</label>
        <input type="checkbox" id="fix1">
        <input type="range" id="p1" min="0" max="100" step="0.1">
        <input type="number" id="n1" min="0" max="100" step="0.1" style="width:60px;">
        <span>%</span>
    </div>
    <div class="row">
        <label>2</label>
        <input type="checkbox" id="fix2">
        <input type="range" id="p2" min="0" max="100" step="0.1">
        <input type="number" id="n2" min="0" max="100" step="0.1" style="width:60px;">
        <span>%</span>
    </div>
    <div class="row">
        <label>3</label>
        <input type="checkbox" id="fix3">
        <input type="range" id="p3" min="0" max="100" step="0.1">
        <input type="number" id="n3" min="0" max="100" step="0.1" style="width:60px;">
        <span>%</span>
    </div>
    <div class="row">
        <label>4</label>
        <input type="checkbox" id="fix4">
        <input type="range" id="p4" min="0" max="100" step="0.1">
        <input type="number" id="n4" min="0" max="100" step="0.1" style="width:60px;">
        <span>%</span>
    </div>
</div>

<script>
let grid = [];
const size = 4;

function initCells() {
    const game = document.getElementById("game");
    game.innerHTML = "";
    // #game をアニメーション用に relative にしておく
    game.style.position = "relative";

    for (let i = 0; i < size * size; i++) {
        const cell = document.createElement("div");
        cell.className = "cell";
        game.appendChild(cell);
    }
}

function init() {
    grid = Array(size).fill(0).map(()=>Array(size).fill(0));
    initCells();      // ← ここを追加
    addRandom();
    addRandom();
    draw();
}

document.getElementById("p1").value = 70;
document.getElementById("n1").value = 70;

document.getElementById("p2").value = 28;
document.getElementById("n2").value = 28;

document.getElementById("p3").value = 1.5;
document.getElementById("n3").value = 1.5;

document.getElementById("p4").value = 0.5;
document.getElementById("n4").value = 0.5;

function draw() {
    const game = document.getElementById("game");

    // 既存タイル削除
    document.querySelectorAll(".tile").forEach(t => t.remove());

    // 背景セルの位置を取得
    const cells = document.querySelectorAll(".cell");

    for (let r = 0; r < size; r++) {
        for (let c = 0; c < size; c++) {

            const val = grid[r][c];
            if (val === 0) continue;

            const tile = document.createElement("div");
            tile.classList.add("tile", "tile-" + val);
            tile.textContent = val;

            // 対応する背景セルの位置を取得
            const index = r * size + c;
            const rect = cells[index].getBoundingClientRect();
            const gameRect = game.getBoundingClientRect();

            // タイルの位置を背景セルに合わせる
            tile.style.top = (rect.top - gameRect.top) + "px";
            tile.style.left = (rect.left - gameRect.left) + "px";

            game.appendChild(tile);
        }
    }
}

function updateFromInput(id) {
    const slider = document.getElementById("p" + id);
    const number = document.getElementById("n" + id);

    let value = parseFloat(number.value);
    if (isNaN(value)) value = 0;
    if (value < 0) value = 0;
    if (value > 100) value = 100;

    number.value = value;
    slider.value = value;

    adjustTotal(id);
}

function updateFromSlider(id) {
    const slider = document.getElementById("p" + id);
    const number = document.getElementById("n" + id);

    let value = parseFloat(slider.value);
    number.value = value;

    adjustTotal(id);
}

function adjustTotal(changedId) {
    let values = {
        1: parseFloat(document.getElementById("p1").value),
        2: parseFloat(document.getElementById("p2").value),
        3: parseFloat(document.getElementById("p3").value),
        4: parseFloat(document.getElementById("p4").value)
    };

    let fixed = {
        1: document.getElementById("fix1").checked,
        2: document.getElementById("fix2").checked,
        3: document.getElementById("fix3").checked,
        4: document.getElementById("fix4").checked
    };

    let total = values[1] + values[2] + values[3] + values[4];

    if (total <= 100) return;

    let excess = total - 100;

    let others = [1,2,3,4].filter(i => i != changedId && !fixed[i]);

    if (others.length === 0) {
        values[changedId] -= excess;
        if (values[changedId] < 0) values[changedId] = 0;
        document.getElementById("p" + changedId).value = values[changedId];
        document.getElementById("n" + changedId).value = values[changedId];
        return;
    }

    let reduceEach = excess / others.length;

    others.forEach(i => {
        values[i] -= reduceEach;
        if (values[i] < 0) values[i] = 0;
        document.getElementById("p" + i).value = values[i];
        document.getElementById("n" + i).value = values[i];
    });
}

["1","2","3","4"].forEach(id=>{
    document.getElementById("p"+id).addEventListener("input", ()=>updateFromSlider(id));
    document.getElementById("n"+id).addEventListener("input", ()=>updateFromInput(id));
});

function addRandom() {
    let empty = [];
    for (let r=0; r<size; r++) {
        for (let c=0; c<size; c++) {
            if (grid[r][c] === 0) empty.push([r,c]);
        }
    }
    if (empty.length === 0) return;

    const [p1,p2,p3,p4] = [
        parseFloat(document.getElementById("p1").value),
        parseFloat(document.getElementById("p2").value),
        parseFloat(document.getElementById("p3").value),
        parseFloat(document.getElementById("p4").value)
    ];

    let rnd = Math.random() * 100;
    let val = 1;
    if (rnd < p1) val = 1;
    else if (rnd < p1+p2) val = 2;
    else if (rnd < p1+p2+p3) val = 3;
    else val = 4;

    let pos = empty[Math.floor(Math.random()*empty.length)];
    grid[pos[0]][pos[1]] = val;
}

function slide(row) {
    row = row.filter(v => v !== 0);
    for (let i=0; i<row.length-1; i++) {
        if (row[i] === row[i+1]) {
            row[i]++;
            row[i+1] = 0;
        }
    }
    row = row.filter(v => v !== 0);
    while (row.length < size) row.push(0);
    return row;
}

function move(dir) {
    const before = JSON.stringify(grid);

    // 1. 移動後の盤面を計算（仮の newGrid を作る）
    let newGrid = JSON.parse(JSON.stringify(grid));

    if (dir === "left") {
        for (let r = 0; r < size; r++) {
            newGrid[r] = slide(newGrid[r]);
        }
    }
    if (dir === "right") {
        for (let r = 0; r < size; r++) {
            let row = newGrid[r].slice().reverse();
            row = slide(row);
            newGrid[r] = row.reverse();
        }
    }
    if (dir === "up") {
        for (let c = 0; c < size; c++) {
            let col = [];
            for (let r = 0; r < size; r++) col.push(newGrid[r][c]);
            col = slide(col);
            for (let r = 0; r < size; r++) newGrid[r][c] = col[r];
        }
    }
    if (dir === "down") {
        for (let c = 0; c < size; c++) {
            let col = [];
            for (let r = 0; r < size; r++) col.push(newGrid[r][c]);
            col = slide(col.reverse()).reverse();
            for (let r = 0; r < size; r++) newGrid[r][c] = col[r];
        }
    }

    // 変化なしなら何もしない
    if (JSON.stringify(newGrid) === before) return;

    // 2. タイルをアニメーションで動かす
    animateTiles(grid, newGrid, dir);

    // 3. アニメーション終了後に盤面を更新
    setTimeout(() => {
        grid = newGrid;
        addRandom();
        draw();
    }, 160); // transition と同じ時間
}

function animateTiles(oldGrid, newGrid, dir) {
    const game = document.getElementById("game");
    const cells = document.querySelectorAll(".cell");

    // 現在のタイルを取得（位置を動かすため）
    const tiles = document.querySelectorAll(".tile");

    // タイルの現在位置を記録
    let tileMap = {}; // "r,c" → tileElement
    tiles.forEach(tile => {
        const val = parseInt(tile.textContent);
        // 現在の位置を oldGrid から探す
        for (let r = 0; r < size; r++) {
            for (let c = 0; c < size; c++) {
                if (oldGrid[r][c] === val && !tileMap[`${r},${c}`]) {
                    tileMap[`${r},${c}`] = tile;
                    return;
                }
            }
        }
    });

    // 移動後の位置にタイルを移動させる
    for (let r = 0; r < size; r++) {
        for (let c = 0; c < size; c++) {

            const newVal = newGrid[r][c];
            if (newVal === 0) continue;

            // oldGrid から newGrid への移動元を探す
            let from = null;

            // 同じ値のタイルを oldGrid から探す
            for (let rr = 0; rr < size; rr++) {
                for (let cc = 0; cc < size; cc++) {
                    if (oldGrid[rr][cc] === newVal && tileMap[`${rr},${cc}`]) {
                        from = { r: rr, c: cc };
                        break;
                    }
                }
                if (from) break;
            }

            // 合成タイルの場合（oldGrid に同じ値が2つある）
            if (!from) {
                // 合成されたタイルは newGrid の位置に新規生成して merge アニメーション
                const tile = document.createElement("div");
                tile.classList.add("tile", "tile-" + newVal, "tile-merge");
                tile.textContent = newVal;

                const rect = cells[r * size + c].getBoundingClientRect();
                const gameRect = game.getBoundingClientRect();

                tile.style.top = (rect.top - gameRect.top) + "px";
                tile.style.left = (rect.left - gameRect.left) + "px";

                game.appendChild(tile);
                continue;
            }

            // 移動元タイルを取得
            const tile = tileMap[`${from.r},${from.c}`];

            // 移動先の座標を取得
            const rect = cells[r * size + c].getBoundingClientRect();
            const gameRect = game.getBoundingClientRect();

            tile.style.top = (rect.top - gameRect.top) + "px";
            tile.style.left = (rect.left - gameRect.left) + "px";

            // 移動後に合成される場合
            if (newVal !== oldGrid[from.r][from.c]) {
                tile.classList.add("tile-merge");
            }

            // このタイルは使ったので削除
            delete tileMap[`${from.r},${from.c}`];
        }
    }
}

let startX, startY;
const gameElement = document.getElementById("game");

gameElement.addEventListener("touchstart", e=>{
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;

    // 盤面上のスワイプはスクロールを止める
    e.preventDefault();
}, { passive: false });

gameElement.addEventListener("touchmove", e=>{
    // スワイプ中もスクロールを止める
    e.preventDefault();
}, { passive: false });

gameElement.addEventListener("touchend", e=>{
    let dx = e.changedTouches[0].clientX - startX;
    let dy = e.changedTouches[0].clientY - startY;

    // 盤面上のスワイプはスクロールを止める
    e.preventDefault();

    if (Math.abs(dx) > Math.abs(dy)) {
        if (dx > 30) move("right");
        else if (dx < -30) move("left");
    } else {
        if (dy > 30) move("down");
        else if (dy < -30) move("up");
    }
}, { passive: false });

function resetGame() {
    init();
}

init();
</script>

</body>
</html>
