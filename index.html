<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Merge+1 4x4</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background: #faf8ef;
        text-align: center;
        margin: 0;
        padding: 0;
    }
    h1 {
        margin-top: 20px;
        color: #776e65;
    }
    #game {
        width: 320px;
        height: 320px;
        background: #bbada0;
        margin: 20px auto;
        padding: 10px;
        border-radius: 6px;
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        grid-gap: 10px;
    }
    .cell {
        width: 70px;
        height: 70px;
        background: #cdc1b4;
        border-radius: 4px;
    }
    .tile {
    position: absolute;
    width: 70px;
    height: 70px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
    font-weight: bold;
    color: #fff;
    transition: top 0.15s ease, left 0.15s ease;
}

.tile-1 { background: #eee4da; color: #776e65; }
.tile-2 { background: #ede0c8; color: #776e65; }
.tile-3 { background: #f2b179; }
.tile-4 { background: #f59563; }
.tile-5 { background: #f67c5f; }
.tile-6 { background: #f65e3b; }
.tile-7 { background: #edcf72; }
.tile-8 { background: #edcc61; }
.tile-9 { background: #edc850; }
.tile-10 { background: #edc53f; }
.tile-11 { background: #edc22e; }

.tile-merge {
    animation: mergePop 0.2s ease;
}

@keyframes mergePop {
    0% { transform: scale(1); }
    50% { transform: scale(1.25); }
    100% { transform: scale(1); }
}

.tile-new {
    animation: popIn 0.2s ease;
}

@keyframes popIn {
    0% { transform: scale(0); }
    100% { transform: scale(1); }
}

    #settings {
        width: 90%;
        margin: 20px auto;
        background: #eee;
        padding: 10px;
        border-radius: 6px;
        text-align: left;
    }
    .row {
        display: flex;
        align-items: center;
        margin: 5px 0;
    }
    .row label {
        width: 30px;
    }
    .row input[type="range"] {
        flex: 1;
        margin: 0 10px;
    }

#undoBtn, #replayBtn, #resetBtn {
    font-size: 24px;
    padding: 8px 16px;
    margin: 4px;
}

#replayControls {
    display: none;
}

#pauseBtn, #stepBackBtn, #resumeBtn, #stepForwardBtn {
    font-size: 24px;
    padding: 8px 16px;
    margin: 4px;
}

</style>
</head>
<body>

<div style="margin: 10px 0;">
    <label>モード：</label>
    <select id="modeSelect">
        <option value="1">モード1（通常）</option>
        <option value="2">モード2（Undo/リプレイ）</option>
    </select>
</div>

<h1>Merge+1 4×4</h1>

<div id="replayControls" style="text-align:center; margin:10px 0;">
    <button id="pauseBtn" onclick="pauseReplay()">一時停止</button>
    <button id="stepBackBtn" onclick="stepBack()">戻る</button>
    <button id="resumeBtn" onclick="resumeReplay()">再生</button>
    <button id="stepForwardBtn" onclick="stepForward()">進む</button>
</div>

<div id="game"></div>

<button id="undoBtn" onclick="undo()">一手戻す</button>
<button id="replayBtn" onclick="replay()">リプレイ</button>
<button id="resetBtn" onclick="resetGame()">リセット</button>

<h2>出現確率設定</h2>
<div id="settings">
    <div class="row">
        <label>1</label>
        <input type="checkbox" id="fix1">
        <input type="range" id="p1" min="0" max="100" step="0.1">
        <input type="number" id="n1" min="0" max="100" step="0.1" style="width:60px;">
        <span>%</span>
    </div>
    <div class="row">
        <label>2</label>
        <input type="checkbox" id="fix2">
        <input type="range" id="p2" min="0" max="100" step="0.1">
        <input type="number" id="n2" min="0" max="100" step="0.1" style="width:60px;">
        <span>%</span>
    </div>
    <div class="row">
        <label>3</label>
        <input type="checkbox" id="fix3">
        <input type="range" id="p3" min="0" max="100" step="0.1">
        <input type="number" id="n3" min="0" max="100" step="0.1" style="width:60px;">
        <span>%</span>
    </div>
    <div class="row">
        <label>4</label>
        <input type="checkbox" id="fix4">
        <input type="range" id="p4" min="0" max="100" step="0.1">
        <input type="number" id="n4" min="0" max="100" step="0.1" style="width:60px;">
        <span>%</span>
    </div>
</div>

<script>
let history = []; // { tiles: deepCopy, score: number }
let historyIndex = -1;
let currentMode = 1;
document.getElementById("modeSelect").addEventListener("change", e => {
    currentMode = Number(e.target.value);
    updateModeUI();
    resetGame();
});

let replayInterval = null;
let replayIndex = 0;
let isPaused = false;

let tiles = []; // { id, value, r, c }
let nextId = 1;
const size = 4;

function initCells() {
    const game = document.getElementById("game");
    game.innerHTML = "";
    // #game をアニメーション用に relative にしておく
    game.style.position = "relative";

    for (let i = 0; i < size * size; i++) {
        const cell = document.createElement("div");
        cell.className = "cell";
        game.appendChild(cell);
    }
}

function init() {
    tiles = [];
    nextId = 1;
    initCells(); 
    addRandomTile();
    addRandomTile();
    draw();
}


document.getElementById("p1").value = 70;
document.getElementById("n1").value = 70;

document.getElementById("p2").value = 28;
document.getElementById("n2").value = 28;

document.getElementById("p3").value = 1.5;
document.getElementById("n3").value = 1.5;

document.getElementById("p4").value = 0.5;
document.getElementById("n4").value = 0.5;

function draw() {
    const game = document.getElementById("game");

    // 既存タイル削除
    document.querySelectorAll(".tile").forEach(t => t.remove());

    const cells = document.querySelectorAll(".cell");
    const gameRect = game.getBoundingClientRect();

    tiles.forEach(tileObj => {
        const tile = document.createElement("div");
        tile.classList.add("tile", "tile-" + tileObj.value);
        tile.textContent = tileObj.value;
        tile.dataset.id = tileObj.id;

        const index = tileObj.r * size + tileObj.c;
        const rect = cells[index].getBoundingClientRect();

        tile.style.top = (rect.top - gameRect.top) + "px";
        tile.style.left = (rect.left - gameRect.left) + "px";

        game.appendChild(tile);
    });
}

function updateFromInput(id) {
    const slider = document.getElementById("p" + id);
    const number = document.getElementById("n" + id);

    let value = parseFloat(number.value);
    if (isNaN(value)) value = 0;
    if (value < 0) value = 0;
    if (value > 100) value = 100;

    number.value = value;
    slider.value = value;

    adjustTotal(id);
}

function updateFromSlider(id) {
    const slider = document.getElementById("p" + id);
    const number = document.getElementById("n" + id);

    let value = parseFloat(slider.value);
    number.value = value;

    adjustTotal(id);
}

function adjustTotal(changedId) {
    let values = {
        1: parseFloat(document.getElementById("p1").value),
        2: parseFloat(document.getElementById("p2").value),
        3: parseFloat(document.getElementById("p3").value),
        4: parseFloat(document.getElementById("p4").value)
    };

    let fixed = {
        1: document.getElementById("fix1").checked,
        2: document.getElementById("fix2").checked,
        3: document.getElementById("fix3").checked,
        4: document.getElementById("fix4").checked
    };

    let total = values[1] + values[2] + values[3] + values[4];

    if (total <= 100) return;

    let excess = total - 100;

    let others = [1,2,3,4].filter(i => i != changedId && !fixed[i]);

    if (others.length === 0) {
        values[changedId] -= excess;
        if (values[changedId] < 0) values[changedId] = 0;
        document.getElementById("p" + changedId).value = values[changedId];
        document.getElementById("n" + changedId).value = values[changedId];
        return;
    }

    let reduceEach = excess / others.length;

    others.forEach(i => {
        values[i] -= reduceEach;
        if (values[i] < 0) values[i] = 0;
        document.getElementById("p" + i).value = values[i];
        document.getElementById("n" + i).value = values[i];
    });
}

["1","2","3","4"].forEach(id=>{
    document.getElementById("p"+id).addEventListener("input", ()=>updateFromSlider(id));
    document.getElementById("n"+id).addEventListener("input", ()=>updateFromInput(id));
});

function addRandomTile() {
    let empty = [];

    // 空きマスを探す
    for (let r = 0; r < size; r++) {
        for (let c = 0; c < size; c++) {
            if (!tiles.some(t => t.r === r && t.c === c)) {
                empty.push({ r, c });
            }
        }
    }

    if (empty.length === 0) return;

    // 出現確率はあなたの UI のまま
    const [p1,p2,p3,p4] = [
        parseFloat(document.getElementById("p1").value),
        parseFloat(document.getElementById("p2").value),
        parseFloat(document.getElementById("p3").value),
        parseFloat(document.getElementById("p4").value)
    ];

    let rnd = Math.random() * 100;
    let val = 1;
    if (rnd < p1) val = 1;
    else if (rnd < p1+p2) val = 2;
    else if (rnd < p1+p2+p3) val = 3;
    else val = 4;

    let pos = empty[Math.floor(Math.random() * empty.length)];

    tiles.push({
        id: nextId++,
        value: val,
        r: pos.r,
        c: pos.c
    });
}

function slideRow(rowTiles) {
    // rowTiles = その行にあるタイルの配列（左から順）
    let result = [];
    let skip = false;

    for (let i = 0; i < rowTiles.length; i++) {
        if (skip) {
            skip = false;
            continue;
        }

        if (i < rowTiles.length - 1 && rowTiles[i].value === rowTiles[i+1].value) {
            // 合成
            result.push({
                id: nextId++,          // 新しいタイルID
                value: rowTiles[i].value + 1,
                mergedFrom: [rowTiles[i].id, rowTiles[i+1].id]
            });
            skip = true;
        } else {
            result.push({
                id: rowTiles[i].id,
                value: rowTiles[i].value
            });
        }
    }

    return result;
}

function tilesChanged(oldTiles, newTiles) {
    if (oldTiles.length !== newTiles.length) return true;

    for (let i = 0; i < oldTiles.length; i++) {
        const o = oldTiles[i];
        const n = newTiles.find(t => t.id === o.id);
        if (!n) return true;
        if (o.r !== n.r || o.c !== n.c) return true;
    }
    return false;
}

function move(dir) {
    const oldTiles = JSON.parse(JSON.stringify(tiles)); // deep copy

    if (dir === "left") {
        for (let r = 0; r < size; r++) {
            // 左方向：列を昇順（0→3）に並べる
            let row = tiles.filter(t => t.r === r).sort((a,b)=>a.c-b.c);
            let newRow = slideRow(row);

            newRow.forEach((t, i) => {
                t.r = r;
                t.c = i;
            });

            tiles = tiles.filter(t => t.r !== r);
            tiles.push(...newRow);
        }
    } else if (dir === "right") {
        for (let r = 0; r < size; r++) {
            // 右方向：列を降順（3→0）に並べる
            let row = tiles.filter(t => t.r === r).sort((a,b)=>b.c-a.c);
            let newRow = slideRow(row);

            newRow.forEach((t, i) => {
                t.r = r;
                t.c = size - 1 - i;
            });

            tiles = tiles.filter(t => t.r !== r);
            tiles.push(...newRow);
        }
    } else if (dir === "up") {
        for (let c = 0; c < size; c++) {
            // 上方向：行を昇順（0→3）に並べる
            let col = tiles.filter(t => t.c === c).sort((a,b)=>a.r-b.r);
            let newCol = slideRow(col);

            newCol.forEach((t, i) => {
                t.r = i;
                t.c = c;
            });

            tiles = tiles.filter(t => t.c !== c);
            tiles.push(...newCol);
        }
    } else if (dir === "down") {
        for (let c = 0; c < size; c++) {
            // 下方向：行を降順（3→0）に並べる
            let col = tiles.filter(t => t.c === c).sort((a,b)=>b.r-a.r);
            let newCol = slideRow(col);

            newCol.forEach((t, i) => {
                t.r = size - 1 - i;
                t.c = c;
            });

            tiles = tiles.filter(t => t.c !== c);
            tiles.push(...newCol);
        }
    }

    // 変化なしなら終了
    if (!tilesChanged(oldTiles, tiles)) return;

    if (currentMode === 2) {
    // Undo後に新しい手を打った場合、未来の履歴を削除
    if (historyIndex < history.length - 1) {
        history = history.slice(0, historyIndex + 1);
    }

    // 現在の盤面を履歴に追加
    history.push(JSON.parse(JSON.stringify(tiles)));
    historyIndex = history.length - 1;
}

    animateTiles(oldTiles, tiles);

    setTimeout(() => {
        addRandomTile();
        draw();
    }, 160);
}

function animateTiles(oldTiles, newTiles) {
    const game = document.getElementById("game");
    const cells = document.querySelectorAll(".cell");
    const gameRect = game.getBoundingClientRect();

    // 合成後のタイルの位置をマップ化（id → {r,c}）
    const mergedTargets = {};
    newTiles.forEach(t => {
        if (t.mergedFrom) {
            const pos = { r: t.r, c: t.c };
            t.mergedFrom.forEach(id => {
                mergedTargets[id] = pos;
            });
        }
    });

    // 1. oldTiles を動かす
    oldTiles.forEach(oldT => {
        const tileEl = document.querySelector(`.tile[data-id="${oldT.id}"]`);
        if (!tileEl) return;

        const newT = newTiles.find(t => t.id === oldT.id);

        let targetPos;

        if (newT) {
            // 通常の移動
            targetPos = { r: newT.r, c: newT.c };
        } else if (mergedTargets[oldT.id]) {
            // 合成に使われるタイル → 合成先へ移動
            targetPos = mergedTargets[oldT.id];
            tileEl.classList.add("tile-remove");
        } else {
            return;
        }

        const index = targetPos.r * size + targetPos.c;
        const rect = cells[index].getBoundingClientRect();

        tileEl.style.top = (rect.top - gameRect.top) + "px";
        tileEl.style.left = (rect.left - gameRect.left) + "px";
    });

    // 2. アニメーション終了後に合成タイルを生成
    setTimeout(() => {
        newTiles.forEach(t => {
            if (t.mergedFrom) {
                const tile = document.createElement("div");
                tile.classList.add("tile", "tile-" + t.value, "tile-merge");
                tile.textContent = t.value;
                tile.dataset.id = t.id;

                const index = t.r * size + t.c;
                const rect = cells[index].getBoundingClientRect();

                tile.style.top = (rect.top - gameRect.top) + "px";
                tile.style.left = (rect.left - gameRect.left) + "px";

                game.appendChild(tile);
            }
        });

        // 合成に使われたタイルを削除
        document.querySelectorAll(".tile-remove").forEach(t => t.remove());

        draw();
    }, 160);
}

let startX, startY;
const gameElement = document.getElementById("game");

gameElement.addEventListener("touchstart", e=>{
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;

    // 盤面上のスワイプはスクロールを止める
    e.preventDefault();
}, { passive: false });

gameElement.addEventListener("touchmove", e=>{
    // スワイプ中もスクロールを止める
    e.preventDefault();
}, { passive: false });

gameElement.addEventListener("touchend", e=>{
    let dx = e.changedTouches[0].clientX - startX;
    let dy = e.changedTouches[0].clientY - startY;

    // 盤面上のスワイプはスクロールを止める
    e.preventDefault();

    if (Math.abs(dx) > Math.abs(dy)) {
        if (dx > 30) move("right");
        else if (dx < -30) move("left");
    } else {
        if (dy > 30) move("down");
        else if (dy < -30) move("up");
    }
}, { passive: false });

function resetGame() {
    init();
}

init();

function undo() {
    if (currentMode !== 2) return;
    if (historyIndex <= 0) return;

    historyIndex--;
    tiles = JSON.parse(JSON.stringify(history[historyIndex]));
    draw();
}

function replay() {
    function replay() {
    if (currentMode !== 2) return;
    if (history.length === 0) return;

    document.getElementById("replayControls").style.display = "block";
    document.getElementById("pauseBtn").style.display = "inline-block";
    document.getElementById("stepBackBtn").style.display = "none";
    document.getElementById("resumeBtn").style.display = "none";
    document.getElementById("stepForwardBtn").style.display = "none";

    replayIndex = 0;
    isPaused = false;

    clearInterval(replayInterval);

    replayInterval = setInterval(() => {
        if (isPaused) return;

        if (replayIndex === 0) {
            tiles = JSON.parse(JSON.stringify(history[0]));
            draw();
            replayIndex++;
            return;
        }

        const oldTiles = JSON.parse(JSON.stringify(history[replayIndex - 1]));
        const newTiles = JSON.parse(JSON.stringify(history[replayIndex]));

        tiles = JSON.parse(JSON.stringify(newTiles));
        animateTiles(oldTiles, newTiles);

        replayIndex++;
        if (replayIndex >= history.length) {
            clearInterval(replayInterval);
        }
    }, 300); // ← 速度調整（後述）
}

function pauseReplay() {
    isPaused = true;

    document.getElementById("pauseBtn").style.display = "none";
    document.getElementById("stepBackBtn").style.display = "inline-block";
    document.getElementById("resumeBtn").style.display = "inline-block";
    document.getElementById("stepForwardBtn").style.display = "inline-block";
}

function resumeReplay() {
    isPaused = false;

    document.getElementById("pauseBtn").style.display = "inline-block";
    document.getElementById("stepBackBtn").style.display = "none";
    document.getElementById("resumeBtn").style.display = "none";
    document.getElementById("stepForwardBtn").style.display = "none";
}

function updateModeUI() {
    const undoBtn = document.getElementById("undoBtn");
    const replayBtn = document.getElementById("replayBtn");
    const replayControls = document.getElementById("replayControls");

    if (currentMode === 2) {
        undoBtn.style.display = "inline-block";
        replayBtn.style.display = "inline-block";
    } else {
        undoBtn.style.display = "none";
        replayBtn.style.display = "none";
        replayControls.style.display = "none"; // ← これでOK
    }
}

window.addEventListener("load", () => {
    document.getElementById("modeSelect").value = currentMode;
    updateModeUI();
});

updateModeUI();

</script>

</body>
</html>
