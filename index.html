<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Merge+1 4x4</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background: #faf8ef;
        text-align: center;
        margin: 0;
        padding: 0;
    }
    h1 {
        margin-top: 20px;
        color: #776e65;
    }
    #game {
        width: 320px;
        height: 320px;
        background: #bbada0;
        margin: 20px auto;
        padding: 10px;
        border-radius: 6px;
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        grid-gap: 10px;
    }
    .cell {
        width: 70px;
        height: 70px;
        background: #cdc1b4;
        border-radius: 4px;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 28px;
        font-weight: bold;
        color: #776e65;
    }
    .n0 { background: #cdc1b4; }
    .n1 { background: #eee4da; }
    .n2 { background: #ede0c8; }
    .n3 { background: #f2b179; color: #f9f6f2; }
    .n4 { background: #f59563; color: #f9f6f2; }
    .n5 { background: #f67c5f; color: #f9f6f2; }
    .n6 { background: #f65e3b; color: #f9f6f2; }
    .n7 { background: #edcf72; }
    .n8 { background: #edcc61; }
    .n9 { background: #edc850; }
    .n10 { background: #edc53f; }
    .n11 { background: #edc22e; }

    #settings {
        width: 90%;
        margin: 20px auto;
        background: #eee;
        padding: 10px;
        border-radius: 6px;
        text-align: left;
    }
    .row {
        display: flex;
        align-items: center;
        margin: 5px 0;
    }
    .row label {
        width: 30px;
    }
    .row input[type="range"] {
        flex: 1;
        margin: 0 10px;
    }
</style>
</head>
<body>

<h1>Merge+1 4×4</h1>

<div id="game"></div>

<button onclick="resetGame()">リセット</button>

<h2>出現確率設定</h2>
<div id="settings">
    <div class="row">
        <label>1</label>
        <input type="checkbox" id="fix1">
        <input type="range" id="p1" min="0" max="100" value="70">
        <span id="v1">70%</span>
    </div>
    <div class="row">
        <label>2</label>
        <input type="checkbox" id="fix2">
        <input type="range" id="p2" min="0" max="100" value="28">
        <span id="v2">28%</span>
    </div>
    <div class="row">
        <label>3</label>
        <input type="checkbox" id="fix3">
        <input type="range" id="p3" min="0" max="100" value="1.5">
        <span id="v3">1.5%</span>
    </div>
    <div class="row">
        <label>4</label>
        <input type="checkbox" id="fix4">
        <input type="range" id="p4" min="0" max="100" value="0.5">
        <span id="v4">0.5%</span>
    </div>
</div>

<script>
let grid = [];
const size = 4;

function init() {
    grid = Array(size).fill(0).map(()=>Array(size).fill(0));
    addRandom();
    addRandom();
    draw();
}

function draw() {
    const game = document.getElementById("game");
    game.innerHTML = "";
    for (let r=0; r<size; r++) {
        for (let c=0; c<size; c++) {
            const v = grid[r][c];
            const cell = document.createElement("div");
            cell.className = "cell n" + v;
            cell.textContent = v === 0 ? "" : v;
            game.appendChild(cell);
        }
    }
}

function getProbabilities() {
    let p1 = parseFloat(document.getElementById("p1").value);
    let p2 = parseFloat(document.getElementById("p2").value);
    let p3 = parseFloat(document.getElementById("p3").value);
    let p4 = parseFloat(document.getElementById("p4").value);

    const fix1 = document.getElementById("fix1").checked;
    const fix2 = document.getElementById("fix2").checked;
    const fix3 = document.getElementById("fix3").checked;
    const fix4 = document.getElementById("fix4").checked;

    let fixedSum = 0;
    if (fix1) fixedSum += p1;
    if (fix2) fixedSum += p2;
    if (fix3) fixedSum += p3;
    if (fix4) fixedSum += p4;

    let free = [];
    if (!fix1) free.push("p1");
    if (!fix2) free.push("p2");
    if (!fix3) free.push("p3");
    if (!fix4) free.push("p4");

    let remain = 100 - fixedSum;
    if (remain < 0) remain = 0;

    if (free.length > 0) {
        let each = remain / free.length;
        free.forEach(id => {
            document.getElementById(id).value = each;
        });
    }

    document.getElementById("v1").textContent = document.getElementById("p1").value + "%";
    document.getElementById("v2").textContent = document.getElementById("p2").value + "%";
    document.getElementById("v3").textContent = document.getElementById("p3").value + "%";
    document.getElementById("v4").textContent = document.getElementById("p4").value + "%";
}

document.querySelectorAll("#settings input").forEach(el=>{
    el.addEventListener("input", getProbabilities);
});

function addRandom() {
    let empty = [];
    for (let r=0; r<size; r++) {
        for (let c=0; c<size; c++) {
            if (grid[r][c] === 0) empty.push([r,c]);
        }
    }
    if (empty.length === 0) return;

    const [p1,p2,p3,p4] = [
        parseFloat(document.getElementById("p1").value),
        parseFloat(document.getElementById("p2").value),
        parseFloat(document.getElementById("p3").value),
        parseFloat(document.getElementById("p4").value)
    ];

    let rnd = Math.random() * 100;
    let val = 1;
    if (rnd < p1) val = 1;
    else if (rnd < p1+p2) val = 2;
    else if (rnd < p1+p2+p3) val = 3;
    else val = 4;

    let pos = empty[Math.floor(Math.random()*empty.length)];
    grid[pos[0]][pos[1]] = val;
}

function slide(row) {
    row = row.filter(v => v !== 0);
    for (let i=0; i<row.length-1; i++) {
        if (row[i] === row[i+1]) {
            row[i]++;
            row[i+1] = 0;
        }
    }
    row = row.filter(v => v !== 0);
    while (row.length < size) row.push(0);
    return row;
}

function move(dir) {
    let moved = false;
    let old = JSON.stringify(grid);

    if (dir === "left") {
        for (let r=0; r<size; r++) {
            let newRow = slide(grid[r]);
            grid[r] = newRow;
        }
    }
    if (dir === "right") {
        for (let r=0; r<size; r++) {
            let row = grid[r].slice().reverse();
            row = slide(row);
            grid[r] = row.reverse();
        }
    }
    if (dir === "up") {
        for (let c=0; c<size; c++) {
            let col = [];
            for (let r=0; r<size; r++) col.push(grid[r][c]);
            col = slide(col);
            for (let r=0; r<size; r++) grid[r][c] = col[r];
        }
    }
    if (dir === "down") {
        for (let c=0; c<size; c++) {
            let col = [];
            for (let r=0; r<size; r++) col.push(grid[r][c]);
            col = slide(col.reverse()).reverse();
            for (let r=0; r<size; r++) grid[r][c] = col[r];
        }
    }

    if (JSON.stringify(grid) !== old) {
        addRandom();
        draw();
    }
}

let startX, startY;
const gameElement = document.getElementById("game");

gameElement.addEventListener("touchstart", e=>{
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;

    // 盤面上のスワイプはスクロールを止める
    e.preventDefault();
}, { passive: false });

gameElement.addEventListener("touchmove", e=>{
    // スワイプ中もスクロールを止める
    e.preventDefault();
}, { passive: false });

gameElement.addEventListener("touchend", e=>{
    let dx = e.changedTouches[0].clientX - startX;
    let dy = e.changedTouches[0].clientY - startY;

    // 盤面上のスワイプはスクロールを止める
    e.preventDefault();

    if (Math.abs(dx) > Math.abs(dy)) {
        if (dx > 30) move("right");
        else if (dx < -30) move("left");
    } else {
        if (dy > 30) move("down");
        else if (dy < -30) move("up");
    }
}, { passive: false });

function resetGame() {
    init();
}

init();
</script>

</body>
</html>
